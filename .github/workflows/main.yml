name: Build Arch Package

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged  # 某些构建可能需要

    steps:
      - name: Update system and install toolchain
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm base-devel sudo git

      - name: Create unprivileged user for makepkg
        run: |
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          pacman -S --noconfirm \
            rust cargo nodejs pnpm pkgconf \
            webkit2gtk-4.1 gtk3 sqlite sqlcipher unixodbc openssl \
            hicolor-icon-theme

      - name: Build package
        run: |
          chown -R builder:builder "$GITHUB_WORKSPACE"
          cd "$GITHUB_WORKSPACE"
          sudo -u builder makepkg -s --noconfirm --needed

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: dbx-arch-package
          path: '*.pkg.tar.zst'
